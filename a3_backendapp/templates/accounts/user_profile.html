{% extends 'base.html' %}

{% block title %}Meu Perfil{% endblock %}

{% block body %}
<div style="max-width: 600px; margin: 30px auto;" class="card">
    <h2 style="text-align: center;">Meu Perfil</h2>
    <div style="text-align: center; margin-bottom: 25px;">
        {% if profile.avatar %}
            <img src="{{ profile.avatar.url }}" width="120" height="120" style="border-radius: 50%; object-fit: cover; border: 2px solid #3498db;">
        {% else %}
            <div style="width: 120px; height: 120px; border-radius: 50%; background: #ccc; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 1.5em; color: white;">
                ?
            </div>
        {% endif %}
        <h3>@{{ profile.user.username }}</h3>
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <p>
            <label><strong>Alterar Foto de Perfil:</strong></label>
            <input type="file" name="avatar">
        </p>
        <p>
            <label><strong>Biografia:</strong></label>
            <textarea name="bio" rows="4">{{ profile.bio }}</textarea>
        </p>
        <p>
            <label><strong>País:</strong></label>
            <input type="text" name="country" value="{{ profile.country }}">
        </p>
        <br />
        <button type="submit" style="width: 100%; padding: 10px;">Salvar Alterações</button>
    </form>
</div>
{% endblock %}
